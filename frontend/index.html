<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generals Deploy</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Generals Deploy</h1>
            <p class="subtitle">Test your trained agents in browser</p>
        </header>

        <main>
            <section class="config-panel">
                <div class="agents-row">
                    <div class="agent-config" id="agent-0-config">
                        <h2>Agent 0</h2>
                        <div class="agent-type-select">
                            <label for="agent-0-type">Type</label>
                            <select id="agent-0-type" onchange="updateAgentUI(0)">
                                <option value="ppo">PPO Model</option>
                                <option value="expander">Expander</option>
                                <option value="random">Random</option>
                            </select>
                        </div>
                        <div class="file-upload" id="agent-0-upload">
                            <input type="file" id="agent-0-file" accept=".eqx" onchange="handleFileSelect(0)">
                            <label for="agent-0-file" class="file-label">
                                <span class="file-icon">+</span>
                                <span class="file-text">Select .eqx file</span>
                            </label>
                            <div class="file-status" id="agent-0-status"></div>
                        </div>
                    </div>

                    <div class="vs-divider">VS</div>

                    <div class="agent-config" id="agent-1-config">
                        <h2>Agent 1</h2>
                        <div class="agent-type-select">
                            <label for="agent-1-type">Type</label>
                            <select id="agent-1-type" onchange="updateAgentUI(1)">
                                <option value="ppo">PPO Model</option>
                                <option value="expander">Expander</option>
                                <option value="random">Random</option>
                            </select>
                        </div>
                        <div class="file-upload" id="agent-1-upload">
                            <input type="file" id="agent-1-file" accept=".eqx" onchange="handleFileSelect(1)">
                            <label for="agent-1-file" class="file-label">
                                <span class="file-icon">+</span>
                                <span class="file-text">Select .eqx file</span>
                            </label>
                            <div class="file-status" id="agent-1-status"></div>
                        </div>
                    </div>
                </div>

                <div class="game-settings">
                    <div class="setting">
                        <label for="grid-size">Grid Size</label>
                        <select id="grid-size">
                            <option value="4">4x4</option>
                            <option value="6">6x6</option>
                            <option value="8" selected>8x8</option>
                            <option value="10">10x10</option>
                            <option value="12">12x12</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label for="max-turns">Max Turns</label>
                        <input type="number" id="max-turns" value="500" min="50" max="2000">
                    </div>
                    <div class="setting">
                        <label for="playback-speed">Playback Speed</label>
                        <select id="playback-speed">
                            <option value="100">Fast (10 FPS)</option>
                            <option value="200" selected>Normal (5 FPS)</option>
                            <option value="500">Slow (2 FPS)</option>
                        </select>
                    </div>
                </div>

                <button id="play-btn" class="play-button" onclick="startSimulation()">
                    Play
                </button>
            </section>

            <section class="game-panel" id="game-panel">
                <div class="game-header">
                    <div class="player-stats" id="player-0-stats">
                        <span class="player-name">Agent 0</span>
                        <span class="stat">Army: <span id="p0-army">0</span></span>
                        <span class="stat">Land: <span id="p0-land">0</span></span>
                    </div>
                    <div class="game-info">
                        <span id="turn-display">Turn 0</span>
                        <span id="game-status"></span>
                    </div>
                    <div class="player-stats" id="player-1-stats">
                        <span class="player-name">Agent 1</span>
                        <span class="stat">Army: <span id="p1-army">0</span></span>
                        <span class="stat">Land: <span id="p1-land">0</span></span>
                    </div>
                </div>

                <div class="canvas-container">
                    <canvas id="game-canvas"></canvas>
                </div>

                <div class="playback-controls">
                    <button id="restart-btn" onclick="restartPlayback()">Restart</button>
                    <button id="prev-btn" onclick="prevFrame()">Prev</button>
                    <button id="pause-btn" onclick="togglePause()">Pause</button>
                    <button id="next-btn" onclick="nextFrame()">Next</button>
                    <input type="range" id="frame-slider" min="0" max="0" value="0" oninput="seekToFrame(this.value)">
                    <span id="frame-counter">0 / 0</span>
                    <button id="save-btn" onclick="saveReplay()" class="save-button">Save Replay</button>
                </div>
            </section>

            <section class="replay-panel">
                <h2>Load Replay</h2>
                <div class="replay-upload">
                    <input type="file" id="replay-file" accept=".json" onchange="handleReplayLoad()">
                    <label for="replay-file" class="file-label">
                        <span class="file-icon">+</span>
                        <span class="file-text">Select .json replay file</span>
                    </label>
                    <div class="file-status" id="replay-status"></div>
                </div>
            </section>

            <div class="loading-overlay" id="loading-overlay">
                <div class="loading-spinner"></div>
                <p>Running simulation...</p>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
